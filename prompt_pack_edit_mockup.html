<div class="min-h-screen bg-slate-50 p-8">
  
  <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
    <div>
      <nav class="text-sm text-slate-500 mb-1">Library / Edit Pack</nav>
      <h1 class="text-3xl font-black text-slate-900">foobar</h1>
    </div>
    <div class="flex gap-4">
      <button class="px-4 py-2 text-red-500 font-semibold hover:bg-red-50 rounded-lg">Delete Pack</button>
      <button class="px-6 py-2 bg-orange-500 text-white font-bold rounded-lg shadow-lg hover:bg-orange-600 transition-all">Save Pack</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto grid grid-cols-12 gap-8">
    
    <div class="col-span-4 space-y-6">
      <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Pack Settings</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Name</label>
            <input type="text" class="w-full border-slate-200 rounded-xl focus:ring-blue-500 focus:border-blue-500" value="foobar">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Status</label>
            <select class="w-full border-slate-200 rounded-xl focus:ring-blue-500">
              <option>Draft</option>
              <option>Live</option>
            </select>
          </div>
        </div>
      </section>

      <section class="bg-blue-600 p-6 rounded-2xl shadow-lg text-white">
        <h2 class="text-xs font-bold uppercase tracking-wider opacity-70 mb-2">Capacity Check</h2>
        <div class="text-4xl font-black mb-1">3 Players</div>
        <p class="text-sm opacity-90">Your pack is currently healthy for a small group session.</p>
        <div class="mt-4 bg-white/20 h-2 rounded-full overflow-hidden">
          <div class="bg-white h-full" style="width: 15%"></div>
        </div>
      </section>
    </div>

    <div class="col-span-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-900">Prompts (3)</h2>
      </div>
      
      <div class="space-y-3">
        <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl group border border-transparent hover:border-blue-200 transition-all">
          <span class="text-slate-300">#1</span>
          <textarea class="flex-1 bg-transparent border-none focus:ring-0 text-lg font-medium resize-none py-0">heen</textarea>
          <button class="opacity-0 group-hover:opacity-100 p-2 text-slate-400 hover:text-red-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
        <button class="w-full py-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50 transition-all">
          + Add New Prompt
        </button>
      </div>
    </div>
  </main>
</div>
