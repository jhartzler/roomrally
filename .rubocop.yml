# Omakase Ruby styling for Rails
inherit_gem:
  rubocop-rails-omakase: rubocop.yml

# Load the RSpec plugin
plugins:
  - rubocop-rspec


# Overwrite or add rules to create your own house style
AllCops:
  # The version of Ruby that RuboCop will target.
  TargetRubyVersion: 3.4
  # Enable new cops by default
  NewCops: enable
  Exclude:
    - 'deploy-worktree/**/*'

# RSpec rules
RSpec:
  Enabled: true

# Enforce shorthand hash syntax
Style/HashSyntax:
  EnforcedShorthandSyntax: always

RSpec/MultipleExpectations:
  Max: 2
  Exclude:
    - 'spec/system/**/*'
    - 'spec/requests/dev_testing_spec.rb'
    - 'spec/requests/trivia_pack_images_spec.rb'
    - 'spec/services/dev_playtest/**/*'
    - 'spec/services/games/category_list_spec.rb'

RSpec/ExampleLength:
  Exclude:
    - 'spec/system/**/*'
    - 'spec/requests/dev_testing_spec.rb'
    - 'spec/requests/trivia_pack_images_spec.rb'
    - 'spec/services/dev_playtest/**/*'
    - 'spec/services/games/category_list_spec.rb'
    - 'spec/services/games/speed_trivia_spec.rb'
    - 'spec/models/trivia_pack_spec.rb'
    - 'spec/models/trivia_question_spec.rb'

RSpec/LetSetup:
  Exclude:
    - 'spec/services/games/category_list_spec.rb'

RSpec/MultipleMemoizedHelpers:
  Exclude:
    - 'spec/services/games/category_list_spec.rb'
    - 'spec/models/category_list_game_spec.rb'

RSpec/IndexedLet:
  Exclude:
    - 'spec/services/games/category_list_spec.rb'
    - 'spec/models/category_list_game_spec.rb'

RSpec/ExpectInHook:
  Exclude:
    - 'spec/services/games/category_list_spec.rb'
